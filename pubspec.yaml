name: finance_app
description: Aplikasi Manajemen Keuangan Pribadi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Google Drive & Auth
  google_sign_in: ^6.1.6
  googleapis: ^11.4.0
  http: ^1.1.0
  
  # UI
  fl_chart: ^0.65.0
  intl: ^0.18.1
  flutter_slidable: ^3.0.1
  iconsax: ^0.0.8
  gap: ^3.0.1
  
  # Utils
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
