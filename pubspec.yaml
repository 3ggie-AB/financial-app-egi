name: finance_app
description: Aplikasi Manajemen Keuangan Pribadi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # flash native
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  
  # Google Drive & Auth
  google_sign_in: ^6.2.1
  googleapis: ^16.0.0
  http: ^1.1.0
  
  # UI
  fl_chart: ^1.1.1
  intl: ^0.20.2
  flutter_slidable: ^4.0.3
  iconsax: ^0.0.8
  gap: ^3.0.1
  
  # Utils
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.0
  awesome_notifications: 0.11.0
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"